{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex items-center gap-3 mb-8">
        <a href="/accounts/dashboard/" class="text-gold hover:underline text-sm">Dashboard</a>
        <span class="text-gray-400">/</span>
        <span class="text-sm">Profile</span>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-8">
        <h1 class="font-display text-2xl text-charcoal dark:text-ivory mb-6">Edit Profile</h1>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="flex items-center gap-4 mb-6">
                <div class="w-20 h-20 rounded-full bg-gradient-to-br from-blush to-lavender flex items-center justify-center font-bold text-2xl text-charcoal overflow-hidden">
                    {% if user.avatar %}<img src="{{ user.avatar.url }}" class="w-full h-full object-cover">{% else %}{{ user.first_name|first }}{% endif %}
                </div>
                <label class="cursor-pointer bg-ivory dark:bg-gray-700 border border-line dark:border-white/10 rounded-full px-4 py-2 text-sm hover:border-gold transition-colors">
                    Change Photo <input type="file" name="avatar" class="hidden" accept="image/*">
                </label>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">First Name</label>
                    <input type="text" name="first_name" value="{{ user.first_name }}" class="w-full border-2 border-line dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold bg-ivory dark:bg-gray-700 dark:text-ivory">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Last Name</label>
                    <input type="text" name="last_name" value="{{ user.last_name }}" class="w-full border-2 border-line dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold bg-ivory dark:bg-gray-700 dark:text-ivory">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Email</label>
                <input type="email" value="{{ user.email }}" disabled class="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-sm bg-gray-50 dark:bg-gray-700 text-gray-400 cursor-not-allowed">
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Phone</label>
                <input type="tel" name="phone" value="{{ user.phone }}" class="w-full border-2 border-line dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold bg-ivory dark:bg-gray-700 dark:text-ivory" placeholder="+91 98765 43210">
            </div>
            <div class="mb-5">
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Date of Birth</label>
                <input type="date" name="date_of_birth" value="{{ user.date_of_birth|date:'Y-m-d' }}" class="w-full border-2 border-line dark:border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gold bg-ivory dark:bg-gray-700 dark:text-ivory">
            </div>
            <label class="flex items-center gap-2 mb-6 cursor-pointer">
                <input type="checkbox" name="newsletter_subscribed" {% if user.newsletter_subscribed %}checked{% endif %} class="w-4 h-4 text-gold">
                <span class="text-sm text-gray-600 dark:text-gray-400">Subscribe to newsletter for exclusive offers</span>
            </label>
            <button type="submit" class="w-full bg-charcoal text-ivory py-4 rounded-full text-[13px] tracking-wide hover:bg-gold transition-colors">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
