{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex items-center gap-3 mb-6">
        <a href="/accounts/addresses/" class="text-gold hover:underline text-sm">Addresses</a>
        <span class="text-gray-400">/</span><span class="text-sm">{{ title }}</span>
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-8">
        <h1 class="font-display text-2xl text-charcoal dark:text-ivory mb-6">{{ title }}</h1>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-4">
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="w-full bg-charcoal text-ivory py-4 rounded-full text-[13px] tracking-wide hover:bg-opacity-90 transition-all mt-2">Save Address</button>
        </form>
    </div>
</div>
<style>
form input, form select, form textarea { width: 100%; border: 2px solid #E8CFCF; border-radius: 12px; padding: 12px 16px; font-size: 14px; background: #F8F4EF; transition: border-color 0.15s; }
form input:focus, form select:focus { outline: none; border-color: #C9A86A; }
form input[type="checkbox"] { width: auto; }
</style>
{% endblock %}
