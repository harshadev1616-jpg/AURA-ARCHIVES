{% extends "base.html" %}
{% block title %}Password changed{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-ivory via-blush/30 to-lavender/30 dark:from-gray-900 dark:to-gray-800 py-12 px-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="inline-block">
                <div class="font-display text-3xl text-charcoal dark:text-ivory">Aura <span class="text-gold">Archives</span></div>
                <p class="text-gold text-xs italic mt-1">Light That Preserves Moments</p>
            </a>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-8 text-center">
            <div class="text-4xl mb-4">✨</div>
            <h1 class="font-display text-2xl text-charcoal dark:text-ivory mb-2">Password changed</h1>
            <p class="text-gray-500 dark:text-ivory/60 text-sm mb-7 leading-relaxed">
                Your password has been updated. You can now sign in with your new password.
            </p>
            <a href="/accounts/login/" class="inline-block bg-charcoal text-ivory px-7 py-3.5 rounded-full text-[13px] tracking-wide hover:bg-gold transition-colors">
                Sign in
            </a>
        </div>
    </div>
</div>
{% endblock %}
