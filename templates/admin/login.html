{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}{{ block.super }}
<link rel="stylesheet" href="{% static 'css/aura-admin.css' %}">
<style>
  body.login { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  /* Keep the a11y skip-link out of the centred layout */
  body.login .skip-to-content-link { position:absolute; left:-9999px; top:auto; }
  .login #container { max-width: 380px; width:100%; }
  /* Dark header so the ivory "AURA" wordmark is visible (it's invisible on cream) */
  .login #header { background:#2B2B2B; padding: 28px 20px 22px; }
  .login #header #site-name a { font-size: 24px; }
  .login .aura-tag { text-align:center; font-style:italic; color:#9c8a6a; font-size:12px; margin:0; padding:8px 0; background:#2B2B2B; }
  .login #content { padding: 28px 30px; }
  /* Stack labels above inputs and make every field the same full width */
  .login #content-main .form-row { display:flex; flex-direction:column; gap:6px; }
  .login #content-main .form-row label { font-weight:600; }
  .login #content-main input[type=text],
  .login #content-main input[type=email],
  .login #content-main input[type=password] { width:100%; box-sizing:border-box; }
  .login form .submit-row { padding: 14px 0 0; }
  .login .submit-row input { background:#2B2B2B; color:#F8F4EF; border-radius:999px; padding:12px; letter-spacing:.05em; }
  .login .submit-row input:hover { background:#B8945A; color:#2B2B2B; }
</style>
{% endblock %}

{% block content_title %}{% endblock %}

{% block content %}
<p class="aura-tag">Light That Preserves Moments</p>
{{ block.super }}
{% endblock %}
