{% extends "base.html" %}
{% block title %}{{ page.title }}{% endblock %}
{% block meta_description %}{{ page.meta_description }}{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="font-display text-4xl text-charcoal dark:text-ivory mb-8">{{ page.title }}</h1>
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 shadow-sm prose prose-lg max-w-none text-gray-700 dark:text-gray-300 leading-relaxed">
        {{ page.content|linebreaks }}
    </div>
</div>
{% endblock %}
