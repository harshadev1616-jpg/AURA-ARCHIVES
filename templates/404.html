{% extends "base.html" %}
{% block title %}Page Not Found — Aura Archives{% endblock %}
{% block content %}
<section class="min-h-[70vh] aura-gradient-bg relative overflow-hidden flex items-center">
    <div class="absolute top-16 left-12 w-48 h-48 rounded-full bg-blush/30 blur-3xl anim-float pointer-events-none"></div>
    <div class="absolute bottom-16 right-12 w-56 h-56 rounded-full bg-lavender/30 blur-3xl anim-float-slow pointer-events-none"></div>
    <div class="relative max-w-xl mx-auto px-4 text-center">
        <div class="text-7xl mb-6 anim-flicker inline-block">🕯️</div>
        <p class="font-display text-7xl md:text-8xl text-gold mb-2">404</p>
        <h1 class="font-display text-3xl text-charcoal dark:text-ivory mb-4">This flame flickered out</h1>
        <p class="text-gray-600 dark:text-gray-300 mb-9 leading-relaxed">
            The page you're looking for has burned down to the wick. But there are plenty more moments waiting to be lit.
        </p>
        <div class="flex flex-wrap gap-4 justify-center">
            <a href="/" data-magnetic class="btn-shimmer bg-gold text-white px-8 py-4 rounded-full font-semibold hover:bg-opacity-90 transition-all shadow-lg">Back Home</a>
            <a href="/shop/" data-magnetic class="border-2 border-charcoal dark:border-ivory text-charcoal dark:text-ivory px-8 py-4 rounded-full font-semibold hover:bg-charcoal hover:text-white dark:hover:bg-ivory dark:hover:text-charcoal transition-all">Explore Candles</a>
        </div>
    </div>
</section>
{% endblock %}
