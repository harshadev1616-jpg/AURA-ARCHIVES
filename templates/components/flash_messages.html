{% if messages %}
<div class="fixed top-20 right-4 z-50 space-y-2" id="flash-messages">
    {% for message in messages %}
    <div class="flex items-center gap-3 bg-white dark:bg-gray-800 border-l-4 px-5 py-4 rounded-lg shadow-lg min-w-72 max-w-sm
                {% if message.tags == 'success' %}border-green-500{% elif message.tags == 'error' %}border-red-500{% else %}border-gold{% endif %}"
         x-data="{show: true}" x-show="show" x-init="setTimeout(() => show=false, 4000)">
        <span class="flex-1 text-sm text-charcoal dark:text-ivory">{{ message }}</span>
        <button @click="show=false" class="text-gray-400 hover:text-gray-600">✕</button>
    </div>
    {% endfor %}
</div>
{% endif %}
